name: PowerMate AI Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test, Build APK and AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1

      - name: Verify project structure
        run: |
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -f app/build.gradle.kts
          ls -la
          echo "✅ Project structure OK"

      - name: Run unit tests
        run: gradle :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Build release APK and AAB
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -e

          if [ -n "$RELEASE_KEYSTORE_BASE64" ] && [ -n "$RELEASE_KEYSTORE_PASSWORD" ] && [ -n "$RELEASE_KEY_ALIAS" ] && [ -n "$RELEASE_KEY_PASSWORD" ]; then
            echo "🔐 Signing secrets found. Building signed release."
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks
            export KEYSTORE_FILE="$GITHUB_WORKSPACE/release-keystore.jks"
            export KEYSTORE_PASSWORD="$RELEASE_KEYSTORE_PASSWORD"
            export KEY_ALIAS="$RELEASE_KEY_ALIAS"
            export KEY_PASSWORD="$RELEASE_KEY_PASSWORD"
          else
            echo "⚠️ Signing secrets not found. Building release with fallback debug signing for CI only."
          fi

          gradle :app:assembleRelease :app:bundleRelease --no-daemon --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: powermate-ai-builds
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            app/build/reports/tests/**/*.html
